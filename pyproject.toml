[tool.pytest.ini_options]
addopts = "-ra"
pythonpath = ["llm_backend"]
python_files = ["test_*.py", "*_test.py"]

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["llm_backend", "rag_doc_parser", "shared_retrieval"]
extend-exclude = ["uploads", "llm_backend/static/dist"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]
